name: TreeHouse Foods
description: >-
  TreeHouse Foods is one of the largest manufacturers of private label packaged
  foods and beverages in North America, producing snack and convenience foods for
  retail grocery and foodservice customers. The company is publicly traded on the
  NYSE (THS) and is headquartered in Oak Brook, Illinois. TreeHouse Foods produces
  over 1,600 SKUs across snacking, beverage, and meal preparation categories.
